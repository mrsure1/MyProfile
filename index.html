<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0b1220',
                        card: 'rgba(255, 255, 255, .06)',
                        border: 'rgba(255, 255, 255, .12)',
                        text: '#ffffff',
                        muted: 'rgba(255, 255, 255, .88)',
                        accent: '#4fd1ff',
                        'neon-orange': '#ff7a18',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans KR"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom animations that are hard to do purely with utility classes */
        @keyframes pulse-custom {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .7;
                transform: scale(0.9);
            }
        }

        .animate-pulse-custom {
            animation: pulse-custom 2s ease-in-out infinite;
        }

        /* Reveal Animations (Required for JS reveal logic) */
        .ai-fade {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .ai-fade.show {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes cascadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .cascade-show {
            animation: cascadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: var(--d, 0ms);
            opacity: 0;
        }

        body {
            background-color: #0b1220;
        }
    </style>
    <title>AI & Robotics 기반 IT 교육 전문가</title>
</head>

<body>
    <div id="ai-landing-root"></div>

    <!-- Dependencies -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.59/build/spline-viewer.js"></script>
    <script src="js/lang-data.js"></script>
    <script src="js/spline-data.js"></script>

    <!-- Main App -->
    <script src="js/app_v2.js"></script>
</body>

</html>
